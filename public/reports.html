<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеттар - Каталитикалық крекинг қондырғысы</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
    <link rel="stylesheet" href="/stylesheets/reports.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Жоғарғы панель -->
        <header class="top-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin: 0;">
                    <i class="fas fa-file-alt"></i> Есептер
                </h1>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <a href="/" class="btn btn-secondary" style="text-decoration: none; padding: 8px 15px;">
                        <i class="fas fa-arrow-left"></i> Басты бетке
                    </a>
                    <div id="userInfo" style="display: flex; align-items: center; gap: 10px; color: white;">
                        <i class="fas fa-user"></i>
                        <span id="usernameDisplay">-</span>
                    </div>
                    <button id="logoutBtn" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Шығу
                    </button>
                </div>
            </div>
        </header>

        <!-- Негізгі мазмұн -->
        <div class="reports-container">
            <!-- Сол жақ панель - Отчеттар тізімі -->
            <aside class="reports-sidebar">
                <h2><i class="fas fa-list"></i> Есептер</h2>
                <ul class="reports-menu">
                    <li class="report-item active" data-report="text">
                        <i class="fas fa-file-text"></i> Тексттік есеп
                    </li>
                    <li class="report-item" data-report="graphic">
                        <i class="fas fa-chart-line"></i> Графиктік есеп
                    </li>
                    <li class="report-item" data-report="statistics">
                        <i class="fas fa-chart-bar"></i> Статистикалық есеп
                    </li>
                </ul>
            </aside>

            <!-- Оң жақ панель - Отчет мазмұны -->
            <main class="reports-content">
                <!-- Тексттік отчет -->
                <section id="text-report" class="report-section active">
                    <div class="report-header">
                        <h2><i class="fas fa-file-text"></i> Тексттік есеп</h2>
                        <div class="report-actions">
                            <button class="btn btn-primary" onclick="window.print()">
                                <i class="fas fa-print"></i> Басып шығару
                            </button>
                            <button class="btn btn-success" onclick="downloadReport('text')">
                                <i class="fas fa-download"></i> Жүктеу
                            </button>
                        </div>
                    </div>
                    <div class="report-body" id="textReportContent">
                        <!-- Тексттік отчет мазмұны мұнда көрсетіледі -->
                    </div>
                </section>

                <!-- Графиктік отчет -->
                <section id="graphic-report" class="report-section">
                    <div class="report-header">
                        <h2><i class="fas fa-chart-line"></i> Графиктік есеп</h2>
                        <div class="report-actions">
                            <select id="graphicPeriod" class="period-select">
                                <option value="24h">Соңғы 24 сағат</option>
                                <option value="7d">Соңғы 7 күн</option>
                                <option value="30d">Соңғы 30 күн</option>
                            </select>
                            <button class="btn btn-primary" onclick="window.print()">
                                <i class="fas fa-print"></i> Басып шығару
                            </button>
                            <button class="btn btn-success" onclick="downloadReport('graphic')">
                                <i class="fas fa-download"></i> Жүктеу
                            </button>
                        </div>
                    </div>
                    <div class="report-body" id="graphicReportContent">
                        <div class="charts-container">
                            <div class="chart-wrapper">
                                <h3>Температура өзгерістері</h3>
                                <canvas id="tempChart"></canvas>
                            </div>
                            <div class="chart-wrapper">
                                <h3>Қысым өзгерістері</h3>
                                <canvas id="pressureChart"></canvas>
                            </div>
                            <div class="chart-wrapper">
                                <h3>Бензин көлемі өзгерістері</h3>
                                <canvas id="volumeChart"></canvas>
                            </div>
                            <div class="chart-wrapper">
                                <h3>Шығын өзгерістері</h3>
                                <canvas id="flowChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Статистикалық отчет -->
                <section id="statistics-report" class="report-section">
                    <div class="report-header">
                        <h2><i class="fas fa-chart-bar"></i> Статистикалық есеп</h2>
                        <div class="report-actions">
                            <select id="statsPeriod" class="period-select">
                                <option value="24h">Соңғы 24 сағат</option>
                                <option value="7d">Соңғы 7 күн</option>
                                <option value="30d">Соңғы 30 күн</option>
                            </select>
                            <button class="btn btn-primary" onclick="window.print()">
                                <i class="fas fa-print"></i> Басып шығару
                            </button>
                            <button class="btn btn-success" onclick="downloadReport('statistics')">
                                <i class="fas fa-download"></i> Жүктеу
                            </button>
                        </div>
                    </div>
                    <div class="report-body" id="statisticsReportContent">
                        <!-- Статистикалық отчет мазмұны мұнда көрсетіледі -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="/javascripts/reports.js"></script>
</body>
</html>
